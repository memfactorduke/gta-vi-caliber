; Kit's player BP uses the ThirdPersonShooterKit's original axis names
; (MoveSideways / Turn Right/Left / LookUpMouse); the input merge renamed those to
; MoveRight / Turn / LookUp, so the kit's strafe + mouse-look axis events resolved
; to nothing ("references unknown Axis" warnings). Re-add the kit names on the same
; keys so those events work again. Read at startup — restart the editor to apply.
+AxisMappings=(AxisName="MoveSideways",Scale=-1.000000,Key=A)
