; ---------------------------------------------------------------------------
; GTC foundation scaffold ("execute first"): Enhanced Input.
; Replaces the Godot InputMap (project.godot ~21 actions) + StickInput/InputRemap.
; Input Actions (IA_*) and Mapping Contexts (IMC_*) are content assets created by
; tools/ue5/setup_foundation.py (run in-editor). See docs/NATIVE_FEATURES.md.
; ---------------------------------------------------------------------------
[/Script/Engine.InputSettings]
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent

; ---------------------------------------------------------------------------
; ThirdPersonShooterKit legacy ActionMappings/AxisMappings. The kit's player &
; weapon Blueprints fire legacy "InputAction X" event nodes (Shoot/Reload/Aiming/
; weapon slots/melee/grenade/cover). GTC's own input is Enhanced Input (separate
; system) so these are purely additive. Remove once the kit player is rewired to
; GTC's IA_*/IMC_* Enhanced Input.
; ---------------------------------------------------------------------------
+ActionMappings=(ActionName="Aiming",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_LeftTrigger)
+ActionMappings=(ActionName="Aiming",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=RightMouseButton)
+ActionMappings=(ActionName="CameraCenter",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_RightThumbstick)
+ActionMappings=(ActionName="CameraCenter",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Z)
; Kit's player BP fires a separate "CameraCenterSecondButton" InputAction event
; (a second binding for camera-centering) that was missed in the input merge, so its
; node warned "references unknown Action". Define it on the gamepad stick-click;
; same camera-center result, clears the compile warning.
