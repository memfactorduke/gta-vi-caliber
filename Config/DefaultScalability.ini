; GTC quality tiers — NATIVE #7 (replaces game/scripts/world/{graphics_quality,world_quality}.gd).
; The Godot LOW/MEDIUM/HIGH/ULTRA tiers map 1:1 onto UE5 Scalability groups (@0..@3) here, tuned
; against the project's 60 fps / 1080p / RTX-3060-class budget. @4 = "Cinematic" (capture only).
; Crowd/traffic density (the old NPC/traffic multipliers) is NOT an engine Scalability group — it is
; driven by Mass LOD per tier; see docs/NATIVE_FEATURES.md (#7) for where that hooks in.
; Anti-aliasing is TSR (UE5 default); the old 0.85 dynamic 3D scale → ResolutionQuality/screen %.

[ResolutionQuality@0]
r.ScreenPercentage=58
[ResolutionQuality@1]
r.ScreenPercentage=71
[ResolutionQuality@2]
r.ScreenPercentage=85
[ResolutionQuality@3]
r.ScreenPercentage=100
[ResolutionQuality@4]
r.ScreenPercentage=100

[ViewDistanceQuality@0]
r.ViewDistanceScale=0.6
[ViewDistanceQuality@1]
r.ViewDistanceScale=0.8
[ViewDistanceQuality@2]
r.ViewDistanceScale=1.0
[ViewDistanceQuality@3]
r.ViewDistanceScale=1.2
[ViewDistanceQuality@4]
r.ViewDistanceScale=2.0

[ShadowQuality@0]
