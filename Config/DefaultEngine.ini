r.Nanite.ProjectEnabled=True
; RT shadows OFF so Virtual Shadow Maps (enabled above) draw shadows. RT shadows
; trace against the RT scene, but skeletal meshes are excluded from it
; (r.RayTracing.Geometry.SkeletalMeshes=0) — so with RT shadows ON, NO character
; cast a shadow. VSM includes skeletal meshes, so characters shadow correctly,
; and VSM is cheaper than RT shadows on Mac/Metal. (Shadow setting only — does
; NOT touch the Lumen reflection path, so unrelated to the earlier crash.)
r.RayTracing.Shadows=0
; NATIVE #4/#3 streaming -> World Partition runtime hash + HLOD (OpenWorld map is WP-enabled).
r.VirtualTextures=True
r.GPUSkin.Support16BitBoneIndex=True
r.GPUSkin.UnlimitedBoneInfluences=True
SkeletalMesh.UseExperimentalChunking=1

