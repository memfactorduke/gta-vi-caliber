+PackageRedirects=(OldName="/Game/FPS_Weapon_Bundle/",NewName="/Game/GTCaliberAssets/Content/FPS_Weapon_Bundle/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/Realistic_Starter_VFX_Pack_Vol2/",NewName="/Game/GTCaliberAssets/Content/Realistic_Starter_VFX_Pack_Vol2/",MatchSubstring=true)
; Module rename: assets copied from the original ../GTC project reference its C++
; module as /Script/GTC, but this project's runtime module is GTC_UE5. Without this
; the front-end map (L_FrontEnd) can't resolve its World Settings GameMode override
; (/Script/GTC.GTCFrontEndGameMode) and silently falls back to the gameplay GameMode,
; so the intro -> menu -> loading flow never spawns. Exact package match (no
; MatchSubstring) so it only rewrites the dead old-module root.
+PackageRedirects=(OldName="/Script/GTC",NewName="/Script/GTC_UE5")

; --- Navigation -------------------------------------------------------------
; The living-NPC layer (NPC/Agent) paths citizens on the NavMesh when one exists.
; Dynamic runtime generation lets the mesh build/refresh while the game runs and
; content streams, so AGTCCitizen::RecomputePath gets real paths. A level still
; needs a NavMeshBoundsVolume to define the area to mesh; until one is present the
; citizen falls back to direct steering, so this is purely additive.

[/Script/NavigationSystem.NavigationSystemV1]
bAutoCreateNavigationData=True
bInitializeNavigationOnBegin=True

[/Script/NavigationSystem.RecastNavMesh]
RuntimeGeneration=Dynamic

; --- Logging ----------------------------------------------------------------
; On macOS the editor's bundled font (Roboto) lacks some glyphs used by Slate UI
; (e.g. the U+23F5 "play" triangle), so Slate falls back to /System/Library/Fonts/
; Monaco.ttf and logs a "Could not find Glyph Index 0 with codepoint ..." warning.
; The text still renders fine via the fallback font; the warning is pure noise and
; comes from engine UI, not this project. Drop LogSlate to Error to silence it
; while keeping genuine Slate errors visible.

[Core.Log]
LogSlate=Error

