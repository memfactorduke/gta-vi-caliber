; Physical surface types drive the weapon/melee/throwable impact FX (see
; Source/GTC_UE5/World/Surfaces/SurfaceImpact.*). A PhysicalMaterial assigned to a mesh or
; material carries one of these SurfaceTypeN slots; a trace with bReturnPhysicalMaterial reads
; it back and FGTCSurfaceImpact::PhysicalSurfaceToSurface maps the index to the impact burst.
; ORDER IS LOAD-BEARING: SurfaceType1..5 must stay Wood/Metal/Glass/Concrete/Flesh to match the
; switch in PhysicalSurfaceToSurface. Append new materials at SurfaceType6+; never reorder.
[/Script/Engine.PhysicsSettings]
