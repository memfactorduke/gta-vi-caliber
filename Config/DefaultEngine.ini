; ---------------------------------------------------------------------------
; GTC foundation (NATIVE features). Lumen (DynamicGI=1, Reflection=1) + Virtual
; Shadow Maps + Substrate + ray tracing are already set above. The lines below
; pin the remaining NATIVE-feature defaults the migration relies on.
; NATIVE #2 Impostor->Nanite, #7 quality, #6/#8 materials: enable Nanite project-wide.
[/Script/Engine.Engine]
bUseInterchangeFramework=True

; This 5.7 editor's Interchange FBX path crashes on import (SIGSEGV in
; UInterchangeTextureFactory::SetupObject_GameThread / task-graph recursion).
; Route FBX through the stable legacy FbxFactory while keeping Interchange for
; glTF/GLB (NATIVE #15). Read at editor startup — relaunch to apply.
[ConsoleVariables]
Interchange.FeatureFlags.Import.FBX=False

; "Ray tracing PSO is not ready yet, using fallback" — emitted by the renderer
; when an RT pipeline object is still compiling in the background (the default
; r.RayTracing.NonBlockingPipelineCreation=1) and a frame needs it first, so it
; draws with a fallback shader. UE can't precache/bundle RT PSOs, so the fix is
; to compile them synchronously: no fallback is ever used and the message stops.
; Trade-off: a one-time hitch the first time each RT material/PSO is encountered
; in a session (then cached). Acceptable for editor/dev; read at startup.
r.RayTracing.NonBlockingPipelineCreation=0

; Intermittent UE 5.8 render-thread ensure: "Ensure condition failed:
; IsInGameThread() [AppTime.cpp:43]" via FSlate3DRenderer::DrawWindowToTarget_
; RenderThread -> FSlateBaseUTextureResource::AccessRHIResource -> FAppTime::Get().
; Fires sporadically when a UMG widget with a texture brush is rendered to a
; render target (RetainerBox path) on the render thread without an inherited
; FAppTime context. Disabling retained (widget-to-texture) rendering keeps those
; widgets on the direct Slate path and avoids FSlate3DRenderer entirely.
; Trade-off: loses RetainerBox render caching (negligible for HUD-scale UI).
; Read at startup — restart the editor to apply. If the ensure persists, the
; trigger is a 3D UWidgetComponent instead; that needs the component fixed, not
; this cvar.
Slate.EnableRetainedRendering=0

; "TEXTURE STREAMING POOL OVER <n> MiB BUDGET" on-screen warning: the streamed-
; texture working set for the open-world map (CityBeachStrip, Cesium + many
; surface/character textures) exceeds the auto-sized pool, so the streamer evicts
; mips and surfaces render blurry/low-res. Raise the pool. 4096 MiB is safe on
; this 64 GB unified-memory Mac (pool is capped to available VRAM anyway).
; Read at startup — restart the editor to apply.
r.Streaming.PoolSize=4096

; ---------------------------------------------------------------------------
; CoreRedirects for the GT-Caliber-Asset submodule. Marketplace packs reference
; their own assets by /Game/<Pack>/ root paths, but the submodule mounts at
; /Game/GTCaliberAssets/Content/, so these remap the pack roots to the mount.
; One line per /Game/-rooted pack root (see docs/ASSET_HANDLING.md). Loads at
; engine startup (restart the editor after editing).

[/Script/Engine.WorldSettings]
bEnableWorldComposition=False
; NATIVE #15 asset re-import: prefer Interchange glTF path for GLB packs.

[CoreRedirects]
