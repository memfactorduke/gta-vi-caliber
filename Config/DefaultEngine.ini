; ---------------------------------------------------------------------------
; GTC foundation (NATIVE features). Lumen (DynamicGI=1, Reflection=1) + Virtual
; Shadow Maps + Substrate + ray tracing are already set above. The lines below
; pin the remaining NATIVE-feature defaults the migration relies on.
; NATIVE #2 Impostor->Nanite, #7 quality, #6/#8 materials: enable Nanite project-wide.
[/Script/Engine.Engine]
bUseInterchangeFramework=True

; This 5.7 editor's Interchange FBX path crashes on import (SIGSEGV in
; UInterchangeTextureFactory::SetupObject_GameThread / task-graph recursion).
; Route FBX through the stable legacy FbxFactory while keeping Interchange for
; glTF/GLB (NATIVE #15). Read at editor startup — relaunch to apply.
[ConsoleVariables]
Interchange.FeatureFlags.Import.FBX=False

; ---------------------------------------------------------------------------
; CoreRedirects for the GT-Caliber-Asset submodule. Marketplace packs reference
; their own assets by /Game/<Pack>/ root paths, but the submodule mounts at
; /Game/GTCaliberAssets/Content/, so these remap the pack roots to the mount.
; One line per /Game/-rooted pack root (see docs/ASSET_HANDLING.md). Loads at
; engine startup (restart the editor after editing).

[/Script/Engine.WorldSettings]
bEnableWorldComposition=False
; NATIVE #15 asset re-import: prefer Interchange glTF path for GLB packs.

[CoreRedirects]
+PackageRedirects=(OldName="/Game/CityBeachStrip/",NewName="/Game/GTCaliberAssets/Content/CityBeachStrip/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/Characters/",NewName="/Game/GTCaliberAssets/Content/Characters/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/LevelPrototyping/",NewName="/Game/GTCaliberAssets/Content/LevelPrototyping/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/Input/",NewName="/Game/GTCaliberAssets/Content/Input/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/Missions/",NewName="/Game/GTCaliberAssets/Content/Missions/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/Movies/",NewName="/Game/GTCaliberAssets/Content/Movies/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/FrontEnd/",NewName="/Game/GTCaliberAssets/Content/FrontEnd/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/OpenCity/",NewName="/Game/GTCaliberAssets/Content/OpenCity/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/ThirdPerson/",NewName="/Game/GTCaliberAssets/Content/ThirdPerson/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/CesiumSettings/",NewName="/Game/GTCaliberAssets/Content/CesiumSettings/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/CitySampleVehicles/",NewName="/Game/GTCaliberAssets/Content/CitySampleVehicles/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/FPS_Weapon_Bundle/",NewName="/Game/GTCaliberAssets/Content/FPS_Weapon_Bundle/",MatchSubstring=true)
+PackageRedirects=(OldName="/Game/Realistic_Starter_VFX_Pack_Vol2/",NewName="/Game/GTCaliberAssets/Content/Realistic_Starter_VFX_Pack_Vol2/",MatchSubstring=true)
; Module rename: assets copied from the original ../GTC project reference its C++
; module as /Script/GTC, but this project's runtime module is GTC_UE5. Without this
; the front-end map (L_FrontEnd) can't resolve its World Settings GameMode override
; (/Script/GTC.GTCFrontEndGameMode) and silently falls back to the gameplay GameMode,
; so the intro -> menu -> loading flow never spawns. Exact package match (no
; MatchSubstring) so it only rewrites the dead old-module root.
+PackageRedirects=(OldName="/Script/GTC",NewName="/Script/GTC_UE5")

; --- Navigation -------------------------------------------------------------
; The living-NPC layer (NPC/Agent) paths citizens on the NavMesh when one exists.
; Dynamic runtime generation lets the mesh build/refresh while the game runs and
; content streams, so AGTCCitizen::RecomputePath gets real paths. A level still
; needs a NavMeshBoundsVolume to define the area to mesh; until one is present the
; citizen falls back to direct steering, so this is purely additive.

[/Script/NavigationSystem.NavigationSystemV1]
bAutoCreateNavigationData=True
bInitializeNavigationOnBegin=True

[/Script/NavigationSystem.RecastNavMesh]
RuntimeGeneration=Dynamic

; --- Logging ----------------------------------------------------------------
; On macOS the editor's bundled font (Roboto) lacks some glyphs used by Slate UI
; (e.g. the U+23F5 "play" triangle), so Slate falls back to /System/Library/Fonts/
; Monaco.ttf and logs a "Could not find Glyph Index 0 with codepoint ..." warning.
; The text still renders fine via the fallback font; the warning is pure noise and
; comes from engine UI, not this project. Drop LogSlate to Error to silence it
; while keeping genuine Slate errors visible.

[Core.Log]
LogSlate=Error

