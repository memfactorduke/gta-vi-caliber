

[/Script/EngineSettings.GameMapsSettings]
; Default map: Third Person template playground (Lvl_ThirdPerson) — clean flat
; level (floor + ramp + blockout) for testing player locomotion. The map's World
; Settings override gamemode (BP_ThirdPersonGameMode) is wired to the canonical
; player (BP_GTCPlayerCharacter + GTCPlayerController) so it spawns the real pawn.
; TEMP (TPS-kit testing): boot into the kit showcase map FeaturesMap_v2 to verify the
; migrated player/weapons/AI work before integrating into CityBeachStrip. Revert this
; line to .../ThirdPerson/Lvl_ThirdPerson.Lvl_ThirdPerson when done.
EditorStartupMap=/Game/GTCaliberAssets/Content/CityBeachStrip/Maps/CityBeachStrip.CityBeachStrip
GameDefaultMap=/Game/GTCaliberAssets/Content/ThirdPerson/Lvl_ThirdPerson.Lvl_ThirdPerson
; NOTE: GameDefaultMap was the front-end (L_FrontEnd); repointed to the template map
; per request, so the packaged-game boot now drops straight into this level instead
; of the intro -> menu -> loading flow. Restore L_FrontEnd here to re-enable the front end.
; (prior front-end rationale below.)
; GameDefaultMap is the front-end (intro -> menu -> loading): AGTCFrontEndController builds the
; boot UI there (that map's World Settings GameMode must be GTCFrontEndGameMode), and Start Game
; travels to the city. UGTCGameInstance owns the loading cover so it survives OpenLevel and clears
; once the destination world is up. EditorStartupMap stays on the city so the editor / PIE drop
; straight into gameplay for dev. See Source/GTC_UE5/FrontEnd/README.md.
GameInstanceClass=/Script/GTC_UE5.GTCGameInstance
; Default GameMode so a direct boot / PIE into the city possesses the player
; character (BP_GTCPlayerCharacter + GTCPlayerController) instead of the engine's
; spectator camera. Per-map World Settings can still override this (e.g. the
; front-end map points at GTCFrontEndGameMode).
GlobalDefaultGameMode=/Game/Core/BP_GTCGameMode.BP_GTCGameMode_C

