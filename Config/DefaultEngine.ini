GameDefaultMap=/Game/GTCaliberAssets/Content/FrontEnd/Maps/L_FrontEnd.L_FrontEnd
; GameDefaultMap is the front-end (intro -> menu -> loading): AGTCFrontEndController builds the
; boot UI there (that map's World Settings GameMode must be GTCFrontEndGameMode), and Start Game
; travels to the city. UGTCGameInstance owns the loading cover so it survives OpenLevel and clears
; once the destination world is up. EditorStartupMap stays on the city so the editor / PIE drop
; straight into gameplay for dev. See Source/GTC_UE5/FrontEnd/README.md.
GameInstanceClass=/Script/GTC_UE5.GTCGameInstance
; Default GameMode so a direct boot / PIE into the city possesses the player
; character (BP_GTCPlayerCharacter + GTCPlayerController) instead of the engine's
; spectator camera. Per-map World Settings can still override this (e.g. the
; front-end map points at GTCFrontEndGameMode).
GlobalDefaultGameMode=/Game/Core/BP_GTCGameMode.BP_GTCGameMode_C

